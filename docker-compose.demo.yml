name: isonia-demo-stack

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-isonia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-isonia_local_demo_password}
      POSTGRES_DB: ${POSTGRES_DB:-isonia_demo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  hardhat:
    image: isonia-demo-evm-contracts:${EVM_CONTRACTS_VERSION}
    build:
      context: .
      dockerfile: docker/Dockerfile.evm-contracts
      args:
        EVM_CONTRACTS_TAG: v${EVM_CONTRACTS_VERSION}
        EVM_CONTRACTS_VERSION: ${EVM_CONTRACTS_VERSION}
    environment:
      HARDHAT_NODE_HOST: "0.0.0.0"
      HARDHAT_NODE_NETWORK: "hardhatMainnet"
      HARDHAT_NODE_PORT: "8545"
      HARDHAT_VERBOSE_LOGS: "${HARDHAT_VERBOSE_LOGS:-false}"
    command:
      - bash
      - -lc
      - corepack pnpm node:local
    ports:
      - "127.0.0.1:${HARDHAT_PORT:-8545}:8545"

  contracts-deploy:
    image: isonia-demo-evm-contracts:${EVM_CONTRACTS_VERSION}
    depends_on:
      hardhat:
        condition: service_started
    network_mode: service:hardhat
    environment:
      APP_PORT: "${APP_PORT:-5173}"
      BROWSER_HARDHAT_RPC_URL: "${HARDHAT_RPC_URL:-http://127.0.0.1:8545}"
      CHAIN_ID: "${CHAIN_ID:-31337}"
      CONTAINER_HARDHAT_RPC_URL: "http://hardhat:8545"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}"
      APP_CORE_VERSION: "${APP_CORE_VERSION}"
      CONTROL_PLANE_VERSION: "${CONTROL_PLANE_VERSION}"
      DOCS_VERSION: "${DOCS_VERSION}"
      EVM_CONTRACTS_VERSION: "${EVM_CONTRACTS_VERSION}"
      EVM_CONTRACTS_TAG: "v${EVM_CONTRACTS_VERSION}"
      HARDHAT_RPC_URL: "http://127.0.0.1:8545"
      WALLET_CONNECTION_MODE: "${WALLET_CONNECTION_MODE:-injected-only}"
      POSTGRES_DB: "${POSTGRES_DB:-isonia_demo}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-isonia_local_demo_password}"
      POSTGRES_USER: "${POSTGRES_USER:-isonia}"
      REOWN_PROJECT_ID: "${REOWN_PROJECT_ID:-}"
      RUNTIME_DIR: "/runtime"
      RUN_SEED: "true"
      SDK_VERSION: "${SDK_VERSION}"
      THEME_DEFAULT_VERSION: "${THEME_DEFAULT_VERSION}"
      TYPES_VERSION: "${TYPES_VERSION}"
      createProposal: "${createProposal:-true}"
      manageOrg: "${manageOrg:-true}"
      writeActions: "${writeActions:-true}"
    volumes:
      - ./runtime:/runtime
      - ./scripts:/demo/scripts:ro
    command:
      - bash
      - /demo/scripts/deploy-contracts.sh
    restart: "no"

  control-plane-migrate:
    image: isonia-demo-control-plane:${CONTROL_PLANE_VERSION}
    build:
      context: .
      dockerfile: docker/Dockerfile.control-plane
      args:
        CONTROL_PLANE_TAG: v${CONTROL_PLANE_VERSION}
        CONTROL_PLANE_VERSION: ${CONTROL_PLANE_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
      contracts-deploy:
        condition: service_completed_successfully
    volumes:
      - ./runtime:/runtime:ro
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        while [ ! -s /runtime/control-plane.env ]; do
          echo "[control-plane-migrate] waiting for /runtime/control-plane.env"
          sleep 1
        done
        set -a
        . /runtime/control-plane.env
        set +a
        corepack pnpm db:migrate
    restart: "no"

  control-plane:
    image: isonia-demo-control-plane:${CONTROL_PLANE_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
      control-plane-migrate:
        condition: service_completed_successfully
    volumes:
      - ./runtime:/runtime:ro
    ports:
      - "127.0.0.1:${API_PORT:-3000}:${API_PORT:-3000}"
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        while [ ! -s /runtime/control-plane.env ]; do
          echo "[control-plane] waiting for /runtime/control-plane.env"
          sleep 1
        done
        set -a
        . /runtime/control-plane.env
        set +a
        corepack pnpm dev

  app-core:
    image: isonia-demo-app-core:${APP_CORE_VERSION}
    build:
      context: .
      dockerfile: docker/Dockerfile.app-core
      args:
        APP_CORE_TAG: v${APP_CORE_VERSION}
        APP_CORE_VERSION: ${APP_CORE_VERSION}
    depends_on:
      control-plane:
        condition: service_started
      contracts-deploy:
        condition: service_completed_successfully
    environment:
      API_PORT: "${API_PORT:-3000}"
    volumes:
      - ./runtime:/runtime:ro
      - ./scripts:/demo/scripts:ro
    ports:
      - "127.0.0.1:${APP_PORT:-5173}:5173"
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        while [ ! -s /runtime/isonia.config.json ]; do
          echo "[app-core] waiting for /runtime/isonia.config.json"
          sleep 1
        done
        rm -f /opt/isonia/app-core/dist/isonia.config.local.json
        cp /runtime/isonia.config.json /opt/isonia/app-core/dist/isonia.config.json
        bash /demo/scripts/wait-for-http.sh "http://control-plane:${API_PORT:-3000}/v1/diagnostics" get 180
        bash /demo/scripts/wait-for-http.sh "http://control-plane:${API_PORT:-3000}/v1/capabilities" get 180
        corepack pnpm preview --host 0.0.0.0 --port 5173

volumes:
  postgres-data:
